<!DOCTYPE html>
<html>
<head>
<title>Bắn gà</title>
<style>
canvas{background:#222;display:block;margin:auto}
</style>
</head>

<body>

<canvas id="game" width="500" height="400"></canvas>

<script>
let canvas = document.getElementById("game")
let ctx = canvas.getContext("2d")

let gunX = 250
let chickenX = Math.random()*450
let chickenY = 50

document.addEventListener("mousemove",(e)=>{
gunX = e.offsetX
})

document.addEventListener("click",()=>{

if(Math.abs(gunX-chickenX)<30){
chickenX = Math.random()*450
}

})

function draw(){

ctx.clearRect(0,0,500,400)

ctx.fillStyle="red"
ctx.fillRect(chickenX,chickenY,40,40)

ctx.fillStyle="white"
ctx.fillRect(gunX,350,40,20)

requestAnimationFrame(draw)

}

draw()
</script>

</body>
</html>
