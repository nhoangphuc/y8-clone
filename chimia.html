<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Máy Bay</title>

<style>
body{
margin:0;
overflow:hidden;
}
canvas{
display:block;
}
</style>

</head>
<body>

<canvas id="gamecv"></canvas>

<script>

const canvas = document.getElementById("gamecv");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const planeimg = new Image();
planeimg.src = "ImageGames/maybay.png";

const birdImgs = [];
for (let i = 1; i <= 4; i++) {
  const img = new Image();
  img.src = "ImageGames/frame-" + i + ".png";
  birdImgs.push(img);
}

let birdFrame = 0;
let birdFrameDelay = 0;

const obstaclewidth = 50;
const obstacleheight = 50;

const fuelimg = new Image();
fuelimg.src = "ImageGames/nhienlieu.png";

const starimg = new Image();
starimg.src = "ImageGames/star.png";

const backgroundimg = new Image();
backgroundimg.src = "ImageGames/background.png";

function drawbackground(){
ctx.drawImage(backgroundimg,0,0,canvas.width,canvas.height);
}

const plane = {
x:50,
y:canvas.height/2,
width:50,
height:50,
speed:12
};

const obstacles=[];
const fuels=[];
const stars=[];

let score=0;
let time=10;
let isGameOver=false;

function spawnobstacle(){
obstacles.push({
x:canvas.width,
y:Math.random()*(canvas.height-obstacleheight),
speed:Math.random()*2+2
});
}

function spawnfuel(){
fuels.push({
x:canvas.width,
y:Math.random()*(canvas.height-50)
});
}

function spawnstar(){
stars.push({
x:canvas.width,
y:Math.random()*(canvas.height-50)
});
}

const keys={};

document.addEventListener("keydown",e=>{
keys[e.key]=true;
});

document.addEventListener("keyup",e=>{
keys[e.key]=false;
});

function updateplaneposition(){

if(keys["ArrowUp"] && plane.y>0){
plane.y-=plane.speed;
}

if(keys["ArrowDown"] && plane.y<canvas.height-plane.height){
plane.y+=plane.speed;
}

if(keys["ArrowLeft"] && plane.x>0){
plane.x-=plane.speed;
}

if(keys["ArrowRight"] && plane.x<canvas.width-plane.width){
plane.x+=plane.speed;
}

}

function checkcollisions(){

for(let obstacle of obstacles){
if(
plane.x < obstacle.x + obstaclewidth &&
plane.x + plane.width > obstacle.x &&
plane.y < obstacle.y + obstacleheight &&
plane.y + plane.height > obstacle.y
){
gameover();
}
}

for(let i=stars.length-1;i>=0;i--){
let star=stars[i];

if(
plane.x < star.x + 50 &&
plane.x + plane.width > star.x &&
plane.y < star.y + 50 &&
plane.y + plane.height > star.y
){
score+=10;
stars.splice(i,1);
}
}

for(let i=fuels.length-1;i>=0;i--){
let fuel=fuels[i];

if(
plane.x < fuel.x + 50 &&
plane.x + plane.width > fuel.x &&
plane.y < fuel.y + 50 &&
plane.y + plane.height > fuel.y
){
time+=10;
fuels.splice(i,1);
}
}

}

function gameover(){
if(!isGameOver){
isGameOver=true;
alert("Game Over - Điểm: "+score);
location.reload();
}
}

function gameloop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawbackground();

updateplaneposition();

checkcollisions();

for(let obstacle of obstacles){

obstacle.x-=obstacle.speed;

birdFrameDelay++;
if(birdFrameDelay>6){
birdFrame=(birdFrame+1)%birdImgs.length;
birdFrameDelay=0;
}

ctx.drawImage(
birdImgs[birdFrame],
obstacle.x,
obstacle.y,
obstaclewidth,
obstacleheight
);

}

for(let fuel of fuels){
fuel.x-=2;
ctx.drawImage(fuelimg,fuel.x,fuel.y,50,50);
}

for(let star of stars){
star.x-=1;
ctx.drawImage(starimg,star.x,star.y,50,50);
}

ctx.drawImage(planeimg,plane.x,plane.y,plane.width,plane.height);

if(time>0){
time-=1/60;
}

ctx.fillStyle="black";
ctx.font="20px Arial";

ctx.fillText("Điểm: "+score,10,30);
ctx.fillText("Năng lượng: "+Math.round(time),150,30);

if(time<=0){
gameover();
}

if(!isGameOver){
requestAnimationFrame(gameloop);
}

}

gameloop();

setInterval(spawnobstacle,1000);
setInterval(spawnfuel,7000);
setInterval(spawnstar,6000);

</script>

</body>
</html>
