<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Máy Bay</title>

<style>
body{
margin:0;
overflow:hidden;
}
canvas{
display:block;
}
</style>

</head>
<body>

<canvas id="gamecv"></canvas>

<script>

// ================= CANVAS =================
const canvas = document.getElementById("gamecv");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ================= IMAGE =================
const planeimg = new Image();
planeimg.src = "ImageGames/maybay.png";

const birdImgs = [];
for (let i = 1; i <= 4; i++) {
  const img = new Image();
  img.src = `ImageGames/frame-${i}.png`;
  birdImgs.push(img);
}

const fuelimg = new Image();
fuelimg.src = "ImageGames/nhienlieu.png";

const starimg = new Image();
starimg.src = "ImageGames/star.png";

const heartimg = new Image();
heartimg.src = "ImageGames/heart.png";

const bossimg = new Image();
bossimg.src = "ImageGames/boss.png";

const backgroundimg = new Image();
backgroundimg.src = "ImageGames/background.png";

// ================= CONST =================
const SIZE = 50;

// ================= PLANE =================
const plane = {
x: 80,
y: canvas.height / 2,
width: SIZE,
height: SIZE,
speed: 10
};

// ================= OBJECT =================
const obstacles = [];
const fuels = [];
const stars = [];
const bullets = [];
const hearts = [];
let boss = null;

// ================= STATE =================
let score = 0;
let time = 30;
let lives = 3;
let level = 1;
let isGameOver = false;

let weaponLevel = 1;
let starCount = 0;

let showLevelUp = false;
let levelUpTimer = 0;

// ================= LEVEL =================
const levelConfig = {
1:{speed:3,spawn:1000,target:100},
2:{speed:6,spawn:700,target:300},
3:{speed:9,spawn:500,target:500}
};

// ================= SPAWN =================
function spawnObstacle(){
obstacles.push({
x:canvas.width,
y:Math.random()*(canvas.height-SIZE),
speed:levelConfig[level].speed+Math.random()*2
});
}

function spawnFuel(){
fuels.push({
x:canvas.width,
y:Math.random()*(canvas.height-SIZE)
});
}

function spawnStar(){
stars.push({
x:canvas.width,
y:Math.random()*(canvas.height-SIZE)
});
}

function spawnHeart(){
if(lives<3){
hearts.push({
x:canvas.width,
y:Math.random()*(canvas.height-40)
});
}
}

function spawnBoss(){
boss={
x:canvas.width-220,
y:canvas.height/2-100,
width:180,
height:180,
hp:30
};
}

// ================= CONTROL =================
const keys={};

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// ================= MOVE =================
function updatePlane(){

if(keys["ArrowUp"]) plane.y-=plane.speed;
if(keys["ArrowDown"]) plane.y+=plane.speed;
if(keys["ArrowLeft"]) plane.x-=plane.speed;
if(keys["ArrowRight"]) plane.x+=plane.speed;

if(plane.y<0) plane.y=0;
if(plane.y>canvas.height-plane.height)
plane.y=canvas.height-plane.height;

if(plane.x<0) plane.x=0;
if(plane.x>canvas.width-plane.width)
plane.x=canvas.width-plane.width;
}

// ================= AUTO SHOOT =================
setInterval(()=>{

if(isGameOver) return;
if(bullets.length>40) return;

const x=plane.x+plane.width;
const y=plane.y+plane.height/2;

if(weaponLevel===1){
bullets.push({x,y,vy:0});
}
else if(weaponLevel===2){
bullets.push(
{x,y:y-10,vy:0},
{x,y:y+10,vy:0}
);
}
else{
bullets.push(
{x,y,vy:0},
{x,y:y-15,vy:-0.6},
{x,y:y+15,vy:0.6}
);
}

},200);

// ================= COLLISION =================
function checkCollision(){

for(let i=bullets.length-1;i>=0;i--){
for(let j=obstacles.length-1;j>=0;j--){

if(
bullets[i].x<obstacles[j].x+SIZE &&
bullets[i].x+10>obstacles[j].x &&
bullets[i].y<obstacles[j].y+SIZE &&
bullets[i].y+4>obstacles[j].y
){
bullets.splice(i,1);
obstacles.splice(j,1);
score+=5;
break;
}

}
}

for(let i=obstacles.length-1;i>=0;i--){
if(
plane.x<obstacles[i].x+SIZE &&
plane.x+plane.width>obstacles[i].x &&
plane.y<obstacles[i].y+SIZE &&
plane.y+plane.height>obstacles[i].y
){
obstacles.splice(i,1);
lives--;

weaponLevel=1;
starCount=0;

if(lives<=0) gameOver();
}
}

}

// ================= LEVEL =================
function checkLevelUp(){

if(level<3 && score>=levelConfig[level].target){

level++;

showLevelUp=true;
levelUpTimer=120;

restartSpawn();

if(level===3) spawnBoss();

}

}

// ================= GAME LOOP =================
function gameloop(){

if(isGameOver) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.drawImage(backgroundimg,0,0,canvas.width,canvas.height);

updatePlane();

checkCollision();

checkLevelUp();

obstacles.forEach(o=>{
o.x-=o.speed;
ctx.fillStyle="green";
ctx.fillRect(o.x,o.y,SIZE,SIZE);
});

ctx.fillStyle="red";

for(let i=bullets.length-1;i>=0;i--){

bullets[i].x+=12+level*2;
bullets[i].y+=bullets[i].vy||0;

ctx.fillRect(bullets[i].x,bullets[i].y,10,4);

}

ctx.drawImage(planeimg,plane.x,plane.y,plane.width,plane.height);

time-=1/60;

ctx.fillStyle="black";
ctx.font="20px Arial";

ctx.fillText("Điểm: "+score,20,30);
ctx.fillText("Màn: "+level,140,30);
ctx.fillText("Tim: "+lives,220,30);
ctx.fillText("Time: "+Math.round(time),300,30);

if(time<=0) gameOver();

requestAnimationFrame(gameloop);

}

// ================= GAME OVER =================
function gameOver(){
isGameOver=true;
alert("GAME OVER - Điểm: "+score);
location.reload();
}

// ================= START =================
let obstacleInterval;

function restartSpawn(){
clearInterval(obstacleInterval);
obstacleInterval=setInterval(spawnObstacle,levelConfig[level].spawn);
}

restartSpawn();

setInterval(spawnFuel,7000);
setInterval(spawnStar,6000);
setInterval(spawnHeart,10000);

gameloop();

</script>

</body>
</html>
