<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Plane Shooter Game</title>

<style>

body{
margin:0;
background:black;
text-align:center;
color:white;
font-family:Arial;
overflow:hidden;
}

canvas{
background:black;
display:block;
margin:auto;
border:2px solid white;
}

#menu{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
}

button{
padding:10px 20px;
font-size:20px;
cursor:pointer;
}

#gameOver{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
display:none;
}

</style>
</head>

<body>

<div id="menu">
<h1>Plane Shooter</h1>
<button id="startBtn">Start Game</button>
</div>

<div id="gameOver">
<h1>Game Over</h1>
<p id="finalScore"></p>
<button id="restartBtn">Restart</button>
</div>

<canvas id="game" width="720" height="720"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const planeImg = new Image();
planeImg.src = "plane.png";

const flyImg = new Image();
flyImg.src = "fly.png";

const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");
const gameOverDiv = document.getElementById("gameOver");
const finalScore = document.getElementById("finalScore");
const menu = document.getElementById("menu");

let player;
let bullets;
let enemies;
let score;

let gameRunning = false;

let keys = {};

let stars=[];

/* tạo sao nền */

for(let i=0;i<60;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2

});

}

/* điều khiển */

document.addEventListener("keydown",e=>{

keys[e.key]=true;

if(e.code==="Space" && gameRunning){
shoot();
}

});

document.addEventListener("keyup",e=>{
keys[e.key]=false;
});

/* nút */

startBtn.onclick=startGame;
restartBtn.onclick=startGame;

/* bắt đầu game */

function startGame(){

menu.style.display="none";
gameOverDiv.style.display="none";

player={

x:330,
y:600,
w:60,
h:60,
speed:6

};

bullets=[];
enemies=[];
score=0;

gameRunning=true;

}

/* bắn */

function shoot(){

bullets.push({

x:player.x + player.w/2 -2,
y:player.y,
w:4,
h:10,
speed:8

});

}

/* tạo ruồi */

function spawnEnemy(){

if(!gameRunning) return;

enemies.push({

x:Math.random()*(canvas.width-40),
y:-40,
w:40,
h:40,
speed:2+Math.random()*2

});

}

setInterval(spawnEnemy,1000);

/* update */

function update(){

if(!gameRunning) return;

/* di chuyển */

if(keys["ArrowLeft"]) player.x -= player.speed;
if(keys["ArrowRight"]) player.x += player.speed;

/* giới hạn */

if(player.x < 0) player.x = 0;

if(player.x + player.w > canvas.width)
player.x = canvas.width - player.w;

/* đạn */

bullets.forEach((b,i)=>{

b.y -= b.speed;

if(b.y < 0){
bullets.splice(i,1);
}

});

/* ruồi */

enemies.forEach(e=>{
e.y += e.speed;
});

/* va chạm đạn */

bullets.forEach((b,bi)=>{

enemies.forEach((e,ei)=>{

if(

b.x < e.x + e.w &&
b.x + b.w > e.x &&
b.y < e.y + e.h &&
b.y + b.h > e.y

){

bullets.splice(bi,1);
enemies.splice(ei,1);

score++;

}

});

});

/* ruồi đụng máy bay */

enemies.forEach((e,i)=>{

if(

player.x < e.x + e.w &&
player.x + player.w > e.x &&
player.y < e.y + e.h &&
player.y + player.h > e.y

){

enemies.splice(i,1);

}

});

/* ruồi chạm đáy */

enemies.forEach((e,i)=>{

if(e.y > canvas.height){

enemies.splice(i,1);

}

});

}

/* game over */

function gameOver(){

gameRunning=false;

finalScore.innerText="Điểm: "+score;

gameOverDiv.style.display="block";

}

/* vẽ */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* sao */

ctx.fillStyle="white";

stars.forEach(s=>{

ctx.fillRect(s.x,s.y,s.size,s.size);

s.y+=0.5;

if(s.y>canvas.height){

s.y=0;
s.x=Math.random()*canvas.width;

}

});

if(!gameRunning) return;

/* máy bay */

ctx.drawImage(
planeImg,
player.x,
player.y,
player.w,
player.h
);

/* đạn */

bullets.forEach(b=>{

ctx.fillStyle="yellow";
ctx.shadowColor="yellow";
ctx.shadowBlur=10;

ctx.fillRect(b.x,b.y,b.w,b.h);

ctx.shadowBlur=0;

});

/* ruồi */

enemies.forEach(e=>{

ctx.drawImage(
flyImg,
e.x,
e.y,
e.w,
e.h
);

});

/* điểm */

ctx.fillStyle="white";
ctx.font="20px Arial";

ctx.fillText("Score: "+score,10,30);

}

/* loop */

function gameLoop(){

update();
draw();

requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
